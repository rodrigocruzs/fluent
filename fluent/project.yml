name: Fluent
options:
  bundleIdPrefix: com.fluent
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.3"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    PRODUCT_BUNDLE_IDENTIFIER: com.fluent.app

targets:
  Fluent:
    type: application
    platform: macOS
    sources:
      - path: Fluent
        excludes:
          - "**/*.yml"
    resources:
      - path: ../frontend
        buildPhase: resources
        destination: Resources/frontend
    info:
      path: Fluent/Info.plist
      properties:
        CFBundleName: Fluent
        CFBundleDisplayName: Fluent
        CFBundleIdentifier: com.fluent.app
        CFBundleVersion: "3"
        CFBundleShortVersionString: "1.2"
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        NSUserNotificationAlertStyle: alert
        NSMicrophoneUsageDescription: "Fluent needs access to your microphone to coach your English."
        NSSupportsAutomaticGraphicsSwitching: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - fluent
            CFBundleURLName: com.fluent.app
