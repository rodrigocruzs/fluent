<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluent</title>
<link rel="stylesheet" href="report.css">
</head>
<body>

<!-- Sessions list: default landing page -->
<div id="sessions-page" style="display:none">
  <main class="page sessions-page-inner">
    <header class="masthead sessions-masthead">
      <div class="brand">
        <span class="logo" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 4 Q 4 1, 7 4 T 12 4" stroke="#fff" stroke-width="1.6" stroke-linecap="round" fill="none"/>
            <path d="M2 7 Q 4 4, 7 7 T 12 7" stroke="#fff" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.7"/>
            <path d="M2 10 Q 4 7, 7 10 T 12 10" stroke="#fff" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.4"/>
          </svg>
        </span>
        <span class="wordmark">Fluent</span>
      </div>
      <div class="page-label">Sessions</div>
      <p class="session-summary" id="sessions-summary"></p>

      <div class="session-control" id="session-control">
        <button class="start-button" id="start-btn" type="button">
          <span class="dot"></span>
          Start session
        </button>
        <div class="recording-bar" role="status" aria-live="polite">
          <span class="rec-dot" aria-hidden="true"></span>
          <span class="rec-label">Recording</span>
          <span class="rec-wave" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
          </span>
          <span class="rec-timer" id="rec-timer">00:00</span>
          <span class="rec-divider" aria-hidden="true"></span>
          <button class="rec-stop" type="button" id="stop-btn" aria-label="Stop session">
            <span class="stop-square" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </header>

    <div class="upnext-label">Up next</div>
    <section class="sessions upnext" id="upnext-list">
      <div class="session">
        <span class="session-name">Engineering sync</span>
        <span class="session-date upnext-time">10:30</span>
        <span class="session-duration">30 min</span>
        <span class="session-status"><span class="auto-dot" aria-hidden="true"></span>Auto-record</span>
        <span class="session-chevron" aria-hidden="true">&rsaquo;</span>
      </div>
    </section>

    <div class="sessions-label">History</div>
    <section class="sessions" id="sessions-list"></section>
  </main>
</div>

<!-- Onboarding: shown when no sessions exist -->
<div id="onboarding">
  <div class="brand">
    <span class="logo" aria-hidden="true">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 4 Q 4 1, 7 4 T 12 4" stroke="#fff" stroke-width="1.6" stroke-linecap="round" fill="none"/>
        <path d="M2 7 Q 4 4, 7 7 T 12 7" stroke="#fff" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.7"/>
        <path d="M2 10 Q 4 7, 7 10 T 12 10" stroke="#fff" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.4"/>
      </svg>
    </span>
    <span class="wordmark">Fluent</span>
  </div>
  <h1>Your personal English coach.</h1>
  <p>Start a session before your next call.</p>

  <div class="session-control" id="session-control-onboarding">
    <button class="start-button" id="start-btn-onboarding" type="button">
      <span class="dot"></span>
      Start session
    </button>
    <div class="recording-bar" role="status" aria-live="polite">
      <span class="rec-dot" aria-hidden="true"></span>
      <span class="rec-label">Recording</span>
      <span class="rec-wave" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </span>
      <span class="rec-timer" id="rec-timer-onboarding">00:00</span>
      <span class="rec-divider" aria-hidden="true"></span>
      <button class="rec-stop" type="button" id="stop-btn-onboarding" aria-label="Stop session">
        <span class="stop-square" aria-hidden="true"></span>
      </button>
    </div>
  </div>
</div>

<!-- Report: populated by window.loadReport(data) -->
<div class="report-page" id="page"></div>

<script src="report.js"></script>
</body>
</html>
