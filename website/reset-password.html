<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Fluent</title>
<link rel="icon" type="image/png" sizes="32x32" href="/assets/fluent-icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/fluent-icon-16.png">
<style>
  :root {
    --ink:         #1a1a1a;
    --gray-1:      #555555;
    --gray-2:      #8a8a8a;
    --gray-3:      #b5b5b5;
    --rule:        #e8e8e6;
    --field-bg:    #fafaf9;
    --field-bd:    #e3e3e0;
    --field-bd-h:  #c8c8c5;
    --accent:      #C96442;
    --accent-hover:#b85737;
    --error:       #c0392b;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
    background: #fff;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  a { color: inherit; text-decoration: none; }

  /* ── Top bar ── */
  .topbar {
    padding: 28px 0 0;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
    padding-left: 32px;
    padding-right: 32px;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    background: var(--accent);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .wordmark {
    font-size: 16px;
    color: var(--ink);
    letter-spacing: -0.01em;
    font-weight: 600;
  }

  /* ── Card ── */
  .card-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 32px;
  }

  .card {
    width: 100%;
    max-width: 400px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 6px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--gray-1);
    margin: 0 0 28px;
    line-height: 1.5;
  }

  /* ── Form ── */
  .field { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-1);
    margin-bottom: 6px;
  }

  input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    font-family: inherit;
    background: var(--field-bg);
    border: 1px solid var(--field-bd);
    border-radius: 8px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="password"]:focus {
    border-color: var(--field-bd-h);
  }

  .hint {
    font-size: 12px;
    color: var(--gray-2);
    margin-top: 5px;
  }

  .btn {
    width: 100%;
    padding: 11px 16px;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.15s, opacity 0.15s;
  }

  .btn:hover:not(:disabled) { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.55; cursor: default; }

  /* ── Status messages ── */
  .msg {
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 16px;
    display: none;
  }

  .msg.error {
    background: #fdf2f2;
    color: var(--error);
    border: 1px solid #f5c6c6;
  }

  .msg.success {
    background: #f2fdf5;
    color: #1e6f3e;
    border: 1px solid #b7e8c8;
  }

  .msg.visible { display: block; }

  /* ── Done state ── */
  .done { display: none; text-align: center; }
  .done.visible { display: block; }
  .form-body.hidden { display: none; }

  .done-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #f2fdf5;
    border: 1px solid #b7e8c8;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }

  .done h2 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 8px;
  }

  .done p {
    font-size: 14px;
    color: var(--gray-1);
    margin: 0;
    line-height: 1.6;
  }

  /* ── Invalid token state ── */
  .invalid { display: none; text-align: center; }
  .invalid.visible { display: block; }

  .invalid-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #fdf2f2;
    border: 1px solid #f5c6c6;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }

  .invalid h2 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 8px;
  }

  .invalid p {
    font-size: 14px;
    color: var(--gray-1);
    margin: 0 0 20px;
    line-height: 1.6;
  }

  .link-btn {
    font-size: 14px;
    color: var(--accent);
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    padding: 0;
  }

  .link-btn:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="topbar">
  <a href="/" class="brand">
    <div class="logo">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 4 Q 4 1, 7 4 T 12 4" stroke="#fff" stroke-width="1.6" stroke-linecap="round" fill="none"/>
        <path d="M2 7 Q 4 4, 7 7 T 12 7" stroke="#fff" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.7"/>
        <path d="M2 10 Q 4 7, 7 10 T 12 10" stroke="#fff" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.4"/>
      </svg>
    </div>
    <span class="wordmark">Fluent</span>
  </a>
</div>

<div class="card-wrap">
  <div class="card">

    <!-- No token in URL -->
    <div class="invalid" id="noToken">
      <div class="invalid-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 6v5M10 14h.01" stroke="#c0392b" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="10" cy="10" r="8.5" stroke="#c0392b" stroke-width="1.5"/>
        </svg>
      </div>
      <h2>Invalid link</h2>
      <p>This password reset link is missing or invalid.<br>Please request a new one.</p>
    </div>

    <!-- Reset form -->
    <div class="form-body" id="formBody">
      <h1>Set new password</h1>
      <p class="subtitle">Choose a new password for your Fluent account.</p>

      <div class="msg error" id="errorMsg"></div>

      <form id="resetForm">
        <div class="field">
          <label for="password">New password</label>
          <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
        </div>
        <div class="field">
          <label for="confirm">Confirm password</label>
          <input type="password" id="confirm" placeholder="Repeat your new password" autocomplete="new-password">
          <p class="hint">Minimum 8 characters.</p>
        </div>
        <button type="submit" class="btn" id="submitBtn">Reset password</button>
      </form>
    </div>

    <!-- Success state -->
    <div class="done" id="doneState">
      <div class="done-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M5 10.5l3.5 3.5 6.5-7" stroke="#1e6f3e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>Password updated</h2>
      <p>Your password has been changed.<br>You can now sign in to Fluent with your new password.</p>
    </div>

  </div>
</div>

<script>
  const API = '/api';

  const token = new URLSearchParams(window.location.search).get('token');

  const formBody   = document.getElementById('formBody');
  const noToken    = document.getElementById('noToken');
  const doneState  = document.getElementById('doneState');
  const errorMsg   = document.getElementById('errorMsg');
  const submitBtn  = document.getElementById('submitBtn');
  const pwInput    = document.getElementById('password');
  const cfInput    = document.getElementById('confirm');

  if (!token) {
    noToken.classList.add('visible');
    formBody.classList.add('hidden');
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
  }

  function clearError() {
    errorMsg.textContent = '';
    errorMsg.classList.remove('visible');
  }

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();

    const pw = pwInput.value;
    const cf = cfInput.value;

    if (pw.length < 8) {
      showError('Password must be at least 8 characters.');
      pwInput.focus();
      return;
    }
    if (pw !== cf) {
      showError('Passwords do not match.');
      cfInput.focus();
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Updating…';

    try {
      const res = await fetch(`${API}/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, new_password: pw }),
      });

      if (res.ok) {
        formBody.classList.add('hidden');
        doneState.classList.add('visible');
      } else {
        const data = await res.json().catch(() => ({}));
        showError(data.detail || 'This link is invalid or has expired. Please request a new one.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset password';
      }
    } catch {
      showError('Something went wrong. Please try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Reset password';
    }
  });
</script>

</body>
</html>
