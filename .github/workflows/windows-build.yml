name: Windows installer

# Builds (and, when Azure secrets are present, code-signs) the Windows NSIS
# installer for the Fluent Tauri shell. Runs on windows-latest because Tauri
# compiles a native windows-msvc binary and bundles a Windows CPython engine —
# neither can be produced from macOS/Linux.
#
# Trigger it manually from the Actions tab for a test build (built + signed +
# uploaded as an artifact, not published). Push a "vX.Y.Z" tag matching
# src-tauri/tauri.conf.json's version to cut a real release: this also
# generates website/windows/updates/latest.json and publishes it + the
# installer to the website, so the in-app auto-updater picks it up.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows

    steps:
      - uses: actions/checkout@v4

      - name: Determine if this is a release (tag) run
        id: release
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      # Node — runs sync-frontend.mjs + bundle-engine.mjs (the `prebuild` step)
      # and drives the Tauri CLI.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: windows/package-lock.json

      # Rust — the Tauri host is a Rust crate compiled with the MSVC toolchain
      # (default on windows-latest).
      - uses: dtolnay/rust-toolchain@stable

      # Cache the Rust build to keep CI fast. Keyed on the Cargo lockfile.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: windows/src-tauri

      # Python 3.11 — bundle-engine.mjs creates the shipped CPython venv and
      # installs the engine deps (including the Windows-only C-extension wheels
      # pyaudio / pyaudiowpatch, which is why this must run on Windows).
      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.11"

      - name: Install npm dependencies
        run: npm ci

      # Generate the icon set (icon.ico + PNGs) from the committed
      # icon-source.png. These are gitignored (build artifacts), so CI must
      # regenerate them — tauri-build fails without src-tauri/icons/icon.ico.
      - name: Generate app icons
        run: npm run icons

      - name: Verify tag version matches tauri.conf.json
        if: steps.release.outputs.is_release == 'true'
        shell: bash
        run: |
          tag_version="${{ steps.release.outputs.version }}"
          conf_version=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [[ "$tag_version" != "$conf_version" ]]; then
            echo "::error::Tag version ($tag_version) does not match tauri.conf.json version ($conf_version)"
            exit 1
          fi
          echo "Version check passed: $tag_version"

      - name: Extract release notes from the tag
        if: steps.release.outputs.is_release == 'true'
        shell: bash
        run: |
          tag_name="${GITHUB_REF#refs/tags/}"
          notes=$(git tag -l --format='%(contents)' "$tag_name")
          if [[ -z "$notes" ]]; then
            notes=$(git log -1 --format='%s' "$tag_name")
          fi
          # Write to a file rather than an env var/output: tag messages can
          # be multi-line and contain characters GITHUB_OUTPUT can't hold safely.
          printf '%s' "$notes" > "$RUNNER_TEMP/release-notes.txt"
          cat "$RUNNER_TEMP/release-notes.txt"

      # Azure Trusted Signing CLI, invoked by tauri.conf.json's signCommand.
      # The `cargo install` binary is named `trusted-signing-cli`, but the
      # committed signCommand invokes `artifact-signing-cli` — expose that name
      # too via a copy on PATH so the sign step resolves regardless.
      - name: Install Trusted Signing CLI
        shell: pwsh
        run: |
          cargo install trusted-signing-cli
          $bin = Join-Path $env:USERPROFILE ".cargo\bin"
          Copy-Item "$bin\trusted-signing-cli.exe" "$bin\artifact-signing-cli.exe" -Force

      # Build the installer. `npm run build` runs prebuild (sync-frontend +
      # bundle-engine) then `tauri build`, which produces and signs the NSIS
      # installer. Azure auth is supplied via the service-principal env vars
      # that trusted-signing-cli reads (AZURE_TENANT_ID / CLIENT_ID / SECRET).
      - name: Build Windows installer
        env:
          # Pin the engine venv to the 3.11 provisioned above. Without this,
          # bundle-engine.mjs's `py -3` resolves to the newest Python on the
          # runner (3.14), which has no prebuilt pyaudio/pyaudiowpatch wheels.
          FLUENT_BASE_PYTHON: ${{ steps.setup-python.outputs.python-path }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          # The Tauri updater signs the update bundle with the minisign key.
          # Provide these secrets if you publish auto-updates; harmless if unset.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run build

      - name: Generate latest.json manifest
        if: steps.release.outputs.is_release == 'true'
        shell: bash
        run: |
          installer=$(ls src-tauri/target/release/bundle/nsis/*-setup.exe)
          sig="$installer.sig"
          node scripts/generate-latest-json.mjs \
            "${{ steps.release.outputs.version }}" \
            "$RUNNER_TEMP/release-notes.txt" \
            "$sig" \
            "https://www.tryfluent.co/Fluent-Setup.exe" \
            "$RUNNER_TEMP/latest.json"

      - name: Publish installer + manifest to website
        if: steps.release.outputs.is_release == 'true'
        shell: bash
        run: |
          installer=$(ls src-tauri/target/release/bundle/nsis/*-setup.exe)
          mkdir -p ../website/windows/updates
          cp "$RUNNER_TEMP/latest.json" ../website/windows/updates/latest.json
          cp "$installer" ../website/Fluent-Setup.exe

          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/windows/updates/latest.json website/Fluent-Setup.exe
          git commit -m "release(windows): publish v${{ steps.release.outputs.version }}"
          git push origin HEAD:main

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: fluent-windows-installer
          path: |
            windows/src-tauri/target/release/bundle/nsis/*-setup.exe
            windows/src-tauri/target/release/bundle/nsis/*-setup.exe.sig
          if-no-files-found: error
